<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sales Management</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            color: #333;
            padding: 30px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
            color: #2c3e50;
        }

        h2 {
            font-size: 18px;
            color: #34495e;
            margin-bottom: 15px;
        }

        .card {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 25px;
            max-width: 1000px;
            margin: 0 auto 30px auto;
        }

        .alert {
            max-width: 1000px;
            margin: 0 auto 20px auto;
            padding: 12px 16px;
            border-radius: 6px;
            font-weight: 500;
        }

        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-error   { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        .add-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: #555;
        }

        input {
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #3498db;
        }

        .btn-submit {
            grid-column: span 2;
            padding: 12px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-submit:hover { background: #2980b9; }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        thead {
            background: #2c3e50;
            color: white;
        }

        thead th {
            padding: 12px 14px;
            text-align: left;
        }

        tbody tr:nth-child(even) { background: #f8f9fa; }
        tbody tr:hover { background: #eaf4fb; }

        tbody td {
            padding: 11px 14px;
            border-bottom: 1px solid #e9ecef;
        }

        .no-data {
            text-align: center;
            color: #999;
            padding: 20px;
            font-style: italic;
        }

        .print-form { display: inline; }

        .btn-print {
            padding: 6px 14px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-print:hover { background: #1e8449; }
    </style>
</head>
<body>

<h1>Sales Management</h1>

<!-- Flash Messages -->
<div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
<div class="alert alert-error"   th:if="${errorMessage}"   th:text="${errorMessage}"></div>

<!-- Add Sale Form -->
<div class="card">
    <h2>Add New Sale</h2>
    <form class="add-form" th:action="@{/sales}" th:object="${sale}" method="post">
        <div class="form-group">
            <label for="customerName">Customer Name</label>
            <input type="text" id="customerName" th:field="*{customerName}" placeholder="Enter customer name" required />
        </div>
        <div class="form-group">
            <label for="itemName">Item Name</label>
            <input type="text" id="itemName" th:field="*{itemName}" placeholder="Enter item name" required />
        </div>
        <div class="form-group">
            <label for="quantity">Quantity</label>
            <input type="number" id="quantity" th:field="*{quantity}" placeholder="Enter quantity" min="1" required />
        </div>
        <div class="form-group">
            <label for="unitPrice">Unit Price (Rs.)</label>
            <input type="number" id="unitPrice" th:field="*{unitPrice}" placeholder="Enter unit price" step="0.01" min="0" required />
        </div>
        <button type="submit" class="btn-submit">Add Sale</button>
    </form>
</div>

<!-- Sales Table -->
<div class="card">
    <h2>All Sales</h2>
    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Customer Name</th>
                <th>Item Name</th>
                <th>Quantity</th>
                <th>Unit Price (Rs.)</th>
                <th>Total Price (Rs.)</th>
                <th>Sale Date</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="s : ${sales}">
                <td th:text="${s.id}"></td>
                <td th:text="${s.customerName}"></td>
                <td th:text="${s.itemName}"></td>
                <td th:text="${s.quantity}"></td>
                <td th:text="${#numbers.formatDecimal(s.unitPrice, 1, 2)}"></td>
                <td th:text="${#numbers.formatDecimal(s.totalPrice, 1, 2)}"></td>
                <td th:text="${#temporals.format(s.saleDate, 'yyyy-MM-dd HH:mm')}"></td>
                <td>
                    <form class="print-form" th:action="@{/sales/{id}/print(id=${s.id})}" method="post">
                        <button type="submit" class="btn-print">Print</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(sales)}">
                <td colspan="8" class="no-data">No sales recorded yet.</td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
